<svg width="860" height="360" xmlns="http://www.w3.org/2000/svg"
  font-family="'Malgun Gothic','Apple SD Gothic Neo',Arial,sans-serif">

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">
    구면 조화 함수 계수 형식 변환 (LightGaussian degree 2 기준, 24 rest 계수)
  </text>

  <!-- ── PLY 형식 (위) ── -->
  <text x="40" y="62" font-size="12" font-weight="bold" fill="#2874A6">PLY 저장 형식  (채널별 순차 배열, 24 floats)</text>

  <!-- R channel -->
  <rect x="40"  y="74" width="60" height="36" rx="5" fill="#FADBD8" stroke="#C0392B" stroke-width="1.5"/>
  <text x="70"  y="96" text-anchor="middle" font-size="11" fill="#C0392B">f_rest_0</text>
  <rect x="108" y="74" width="60" height="36" rx="5" fill="#FADBD8" stroke="#C0392B" stroke-width="1.5"/>
  <text x="138" y="96" text-anchor="middle" font-size="11" fill="#C0392B">f_rest_1</text>
  <rect x="176" y="74" width="60" height="36" rx="5" fill="#FADBD8" stroke="#C0392B" stroke-width="1.5"/>
  <text x="206" y="96" text-anchor="middle" font-size="11" fill="#C0392B">f_rest_2</text>
  <text x="252" y="96" font-size="14" fill="#666"> ···</text>
  <rect x="276" y="74" width="60" height="36" rx="5" fill="#FADBD8" stroke="#C0392B" stroke-width="1.5"/>
  <text x="306" y="96" text-anchor="middle" font-size="11" fill="#C0392B">f_rest_7</text>
  <!-- R label -->
  <rect x="40" y="72" width="298" height="40" rx="5" fill="none" stroke="#C0392B" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="344" y="96" font-size="11" fill="#C0392B">← R 채널 (8개)</text>

  <!-- G channel -->
  <rect x="40"  y="126" width="60" height="36" rx="5" fill="#D5F5E3" stroke="#1E8449" stroke-width="1.5"/>
  <text x="70"  y="148" text-anchor="middle" font-size="11" fill="#1E8449">f_rest_8</text>
  <rect x="108" y="126" width="60" height="36" rx="5" fill="#D5F5E3" stroke="#1E8449" stroke-width="1.5"/>
  <text x="138" y="148" text-anchor="middle" font-size="11" fill="#1E8449">f_rest_9</text>
  <rect x="176" y="126" width="60" height="36" rx="5" fill="#D5F5E3" stroke="#1E8449" stroke-width="1.5"/>
  <text x="206" y="148" text-anchor="middle" font-size="11" fill="#1E8449">f_rest_10</text>
  <text x="252" y="148" font-size="14" fill="#666"> ···</text>
  <rect x="276" y="126" width="60" height="36" rx="5" fill="#D5F5E3" stroke="#1E8449" stroke-width="1.5"/>
  <text x="306" y="148" text-anchor="middle" font-size="11" fill="#1E8449">f_rest_15</text>
  <rect x="40" y="124" width="298" height="40" rx="5" fill="none" stroke="#1E8449" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="344" y="148" font-size="11" fill="#1E8449">← G 채널 (8개)</text>

  <!-- B channel -->
  <rect x="40"  y="178" width="60" height="36" rx="5" fill="#D6EAF8" stroke="#2874A6" stroke-width="1.5"/>
  <text x="70"  y="200" text-anchor="middle" font-size="11" fill="#2874A6">f_rest_16</text>
  <rect x="108" y="178" width="60" height="36" rx="5" fill="#D6EAF8" stroke="#2874A6" stroke-width="1.5"/>
  <text x="138" y="200" text-anchor="middle" font-size="11" fill="#2874A6">f_rest_17</text>
  <rect x="176" y="178" width="60" height="36" rx="5" fill="#D6EAF8" stroke="#2874A6" stroke-width="1.5"/>
  <text x="206" y="200" text-anchor="middle" font-size="11" fill="#2874A6">f_rest_18</text>
  <text x="252" y="200" font-size="14" fill="#666"> ···</text>
  <rect x="276" y="178" width="60" height="36" rx="5" fill="#D6EAF8" stroke="#2874A6" stroke-width="1.5"/>
  <text x="306" y="200" text-anchor="middle" font-size="11" fill="#2874A6">f_rest_23</text>
  <rect x="40" y="176" width="298" height="40" rx="5" fill="none" stroke="#2874A6" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="344" y="200" font-size="11" fill="#2874A6">← B 채널 (8개)</text>

  <!-- Conversion arrow -->
  <line x1="430" y1="218" x2="430" y2="252" stroke="#555" stroke-width="2.5" marker-end="url(#arr2)"/>
  <defs>
    <marker id="arr2" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#555"/>
    </marker>
  </defs>
  <rect x="310" y="224" width="240" height="22" rx="4" fill="#F8F9FA" stroke="#888" stroke-width="1"/>
  <text x="430" y="239" text-anchor="middle" font-size="10" fill="#555">
    채널 재배열: sh[i×3+c] = f_rest[i + c×coeffs_per_ch]
  </text>

  <!-- ── SHTableItemFloat32 형식 (아래) ── -->
  <text x="40" y="278" font-size="12" font-weight="bold" fill="#7D3C98">
    SHTableItemFloat32 (계수별 인터리브, 48 floats = 16 × float3)
  </text>

  <!-- Interleaved blocks -->
  <rect x="40"  y="290" width="60" height="52" rx="5" fill="#F4ECF7" stroke="#7D3C98" stroke-width="1.8"/>
  <text x="70" y="308" text-anchor="middle" font-size="10" fill="#C0392B">R₀</text>
  <text x="70" y="322" text-anchor="middle" font-size="10" fill="#1E8449">G₀</text>
  <text x="70" y="336" text-anchor="middle" font-size="10" fill="#2874A6">B₀</text>

  <rect x="108" y="290" width="60" height="52" rx="5" fill="#F4ECF7" stroke="#7D3C98" stroke-width="1.8"/>
  <text x="138" y="308" text-anchor="middle" font-size="10" fill="#C0392B">R₁</text>
  <text x="138" y="322" text-anchor="middle" font-size="10" fill="#1E8449">G₁</text>
  <text x="138" y="336" text-anchor="middle" font-size="10" fill="#2874A6">B₁</text>

  <rect x="176" y="290" width="60" height="52" rx="5" fill="#F4ECF7" stroke="#7D3C98" stroke-width="1.8"/>
  <text x="206" y="308" text-anchor="middle" font-size="10" fill="#C0392B">R₂</text>
  <text x="206" y="322" text-anchor="middle" font-size="10" fill="#1E8449">G₂</text>
  <text x="206" y="336" text-anchor="middle" font-size="10" fill="#2874A6">B₂</text>

  <text x="260" y="320" font-size="16" fill="#666"> ···</text>

  <rect x="290" y="290" width="60" height="52" rx="5" fill="#F4ECF7" stroke="#7D3C98" stroke-width="1.8"/>
  <text x="320" y="308" text-anchor="middle" font-size="10" fill="#C0392B">R₇</text>
  <text x="320" y="322" text-anchor="middle" font-size="10" fill="#1E8449">G₇</text>
  <text x="320" y="336" text-anchor="middle" font-size="10" fill="#2874A6">B₇</text>

  <!-- Padding blocks -->
  <rect x="358" y="290" width="60" height="52" rx="5" fill="#F8F9FA" stroke="#aaa" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="388" y="320" text-anchor="middle" font-size="10" fill="#aaa">pad</text>

  <text x="432" y="320" font-size="16" fill="#aaa"> ···</text>

  <rect x="450" y="290" width="60" height="52" rx="5" fill="#F8F9FA" stroke="#aaa" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="480" y="320" text-anchor="middle" font-size="10" fill="#aaa">pad</text>

  <!-- Labels -->
  <rect x="40" y="288" width="312" height="56" rx="5" fill="none" stroke="#7D3C98" stroke-width="2"/>
  <text x="196" y="358" text-anchor="middle" font-size="10" fill="#7D3C98">degree-2 계수 (8 × float3 = 24 floats)</text>

  <rect x="358" y="288" width="154" height="56" rx="5" fill="none" stroke="#aaa" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="435" y="358" text-anchor="middle" font-size="10" fill="#aaa">zero-padding (7 × float3 = 21 floats)</text>

  <!-- Note at right -->
  <rect x="530" y="74" width="320" height="210" rx="10" fill="#FDFEFF" stroke="#7D3C98" stroke-width="1.5"/>
  <text x="690" y="96" text-anchor="middle" font-size="12" font-weight="bold" fill="#7D3C98">핵심 난제</text>
  <line x1="544" y1="103" x2="836" y2="103" stroke="#D7BDE2" stroke-width="1"/>
  <text x="544" y="122" font-size="10.5" fill="#444">PLY는 채널별 연속 저장:</text>
  <text x="544" y="138" font-size="10"   fill="#777">  [R₀·R₁·...·R₇ | G₀·G₁·...·G₇ | B₀·B₁·...·B₇]</text>
  <text x="544" y="158" font-size="10.5" fill="#444">Unity SHTableItemFloat32는 계수별 인터리브:</text>
  <text x="544" y="174" font-size="10"   fill="#777">  [R₀G₀B₀ | R₁G₁B₁ | ... | R₇G₇B₇ | pad×7]</text>
  <text x="544" y="196" font-size="10.5" fill="#444">LightGaussian --new_max_sh 2 이후</text>
  <text x="544" y="212" font-size="10.5" fill="#444">f_rest 수: 45개(degree3) → 24개(degree2)</text>
  <text x="544" y="232" font-size="10.5" fill="#C0392B">→ 형식 불일치를 무시하면 SH 계수가</text>
  <text x="544" y="248" font-size="10.5" fill="#C0392B">   RGB 채널간 섞여 색상이 완전히 깨짐</text>
  <text x="544" y="268" font-size="10.5" fill="#1E8449">→ 본 연구: coeffs_per_ch = len(rest) ÷ 3</text>
  <text x="544" y="284" font-size="10.5" fill="#1E8449">   으로 degree 동적 감지 + 재배열 + 패딩</text>

  <text x="430" y="340" text-anchor="middle" font-size="11" fill="#666">그림 2. LightGaussian SH 계수 채널 재배열: PLY 채널별 형식 → SHTableItemFloat32 계수별 인터리브 형식</text>
</svg>
