<svg width="740" height="440" xmlns="http://www.w3.org/2000/svg"
  font-family="'Malgun Gothic','Apple SD Gothic Neo',Arial,sans-serif">
  <defs>
    <marker id="a4" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#555"/>
    </marker>
    <marker id="a4r" markerWidth="9" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="9 0,0 3.5,9 7" fill="#555"/>
    </marker>
  </defs>

  <text x="370" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">
    Unity 런타임 로더 — 스레드 분리 구조
  </text>

  <!-- Background thread column -->
  <rect x="20" y="44" width="310" height="358" rx="10" fill="#EBF3FB" stroke="#2874A6" stroke-width="2"/>
  <text x="175" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#2874A6">백그라운드 스레드</text>
  <text x="175" y="84" text-anchor="middle" font-size="10" fill="#888">Task.Run()  —  Unity API 사용 금지</text>
  <line x1="35" y1="92" x2="315" y2="92" stroke="#2874A6" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- BG steps -->
  <rect x="40" y="102" width="270" height="36" rx="7" fill="#D6EAF8" stroke="#2874A6" stroke-width="1.2"/>
  <text x="175" y="118" text-anchor="middle" font-size="11" fill="#2874A6">FileStream / BinaryReader 열기</text>
  <text x="175" y="131" text-anchor="middle" font-size="10" fill="#777">I/O 블로킹 — 메인 스레드 차단 없음</text>

  <line x1="175" y1="138" x2="175" y2="152" stroke="#2874A6" stroke-width="1.5" marker-end="url(#a4)"/>
  <rect x="40" y="152" width="270" height="36" rx="7" fill="#D6EAF8" stroke="#2874A6" stroke-width="1.2"/>
  <text x="175" y="168" text-anchor="middle" font-size="11" fill="#2874A6">Header 검증 (magic / version)</text>
  <text x="175" y="181" text-anchor="middle" font-size="10" fill="#777">0x41534755  ver=1  N 읽기</text>

  <line x1="175" y1="188" x2="175" y2="202" stroke="#2874A6" stroke-width="1.5" marker-end="url(#a4)"/>
  <rect x="40" y="202" width="270" height="36" rx="7" fill="#D6EAF8" stroke="#2874A6" stroke-width="1.2"/>
  <text x="175" y="218" text-anchor="middle" font-size="11" fill="#2874A6">Positions / Scales / Rotations 읽기</text>
  <text x="175" y="231" text-anchor="middle" font-size="10" fill="#777">Buffer.BlockCopy → float[]</text>

  <line x1="175" y1="238" x2="175" y2="252" stroke="#2874A6" stroke-width="1.5" marker-end="url(#a4)"/>
  <rect x="40" y="252" width="270" height="36" rx="7" fill="#D6EAF8" stroke="#2874A6" stroke-width="1.2"/>
  <text x="175" y="268" text-anchor="middle" font-size="11" fill="#2874A6">Colors / hasSH / SH 읽기</text>
  <text x="175" y="281" text-anchor="middle" font-size="10" fill="#777">N×48 floats (SHTableItemFloat32)</text>

  <line x1="175" y1="288" x2="175" y2="302" stroke="#2874A6" stroke-width="1.5" marker-end="url(#a4)"/>
  <rect x="40" y="302" width="270" height="42" rx="7" fill="#A9CCE3" stroke="#2874A6" stroke-width="1.8"/>
  <text x="175" y="320" text-anchor="middle" font-size="11" font-weight="bold" fill="#154360">RawSplatData 반환</text>
  <text x="175" y="336" text-anchor="middle" font-size="10" fill="#777">ScriptableObject / TextAsset 없음</text>
  <text x="175" y="350" text-anchor="middle" font-size="10" fill="#777">순수 float[] — Unity API 불필요</text>

  <!-- Sync line -->
  <rect x="20" y="395" width="700" height="1" fill="none"/>
  <line x1="175" y1="344" x2="175" y2="390" stroke="#2874A6" stroke-width="1.5"/>
  <line x1="175" y1="390" x2="565" y2="390" stroke="#555" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="370" y="386" text-anchor="middle" font-size="10" fill="#555">while (!task.IsCompleted) yield return null  (메인 스레드 양보)</text>
  <line x1="565" y1="390" x2="565" y2="354" stroke="#555" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#a4)"/>

  <!-- Main thread column -->
  <rect x="410" y="44" width="310" height="358" rx="10" fill="#FEF9E7" stroke="#CA6F1E" stroke-width="2"/>
  <text x="565" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#CA6F1E">메인 스레드</text>
  <text x="565" y="84" text-anchor="middle" font-size="10" fill="#888">Unity API 전용 — Coroutine 내</text>
  <line x1="425" y1="92" x2="705" y2="92" stroke="#CA6F1E" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Main thread steps -->
  <rect x="430" y="102" width="270" height="36" rx="7" fill="#FDEBD0" stroke="#CA6F1E" stroke-width="1.2"/>
  <text x="565" y="118" text-anchor="middle" font-size="11" fill="#CA6F1E">ScriptableObject.CreateInstance</text>
  <text x="565" y="131" text-anchor="middle" font-size="10" fill="#777">GaussianSplatAsset  (메인 스레드 전용)</text>

  <line x1="565" y1="138" x2="565" y2="152" stroke="#CA6F1E" stroke-width="1.5" marker-end="url(#a4)"/>
  <rect x="430" y="152" width="270" height="48" rx="7" fill="#FDEBD0" stroke="#CA6F1E" stroke-width="1.2"/>
  <text x="565" y="168" text-anchor="middle" font-size="11" fill="#CA6F1E">TextAsset(byte[]) ×5 생성</text>
  <text x="565" y="182" text-anchor="middle" font-size="10" fill="#777">chunk / pos / other / color / sh</text>
  <text x="565" y="194" text-anchor="middle" font-size="10" fill="#777">Morton swizzle · Smallest-Three 인코딩</text>

  <line x1="565" y1="200" x2="565" y2="214" stroke="#CA6F1E" stroke-width="1.5" marker-end="url(#a4)"/>
  <rect x="430" y="214" width="270" height="48" rx="7" fill="#F9E79F" stroke="#D4AC0D" stroke-width="1.8"/>
  <text x="565" y="230" text-anchor="middle" font-size="11" font-weight="bold" fill="#7D6608">splatObj.SetActive(false)</text>
  <text x="565" y="246" text-anchor="middle" font-size="10" fill="#6E2F08">← OnEnable 방지 핵심</text>
  <text x="565" y="260" text-anchor="middle" font-size="10" fill="#777">AddComponent 전에 비활성화 필수</text>

  <line x1="565" y1="262" x2="565" y2="276" stroke="#CA6F1E" stroke-width="1.5" marker-end="url(#a4)"/>
  <rect x="430" y="276" width="270" height="36" rx="7" fill="#FDEBD0" stroke="#CA6F1E" stroke-width="1.2"/>
  <text x="565" y="293" text-anchor="middle" font-size="11" fill="#CA6F1E">AddComponent&lt;GaussianSplatRenderer&gt;</text>
  <text x="565" y="306" text-anchor="middle" font-size="10" fill="#777">SetField("m_Asset", asset)  via reflection</text>

  <line x1="565" y1="312" x2="565" y2="326" stroke="#CA6F1E" stroke-width="1.5" marker-end="url(#a4)"/>
  <rect x="430" y="326" width="270" height="42" rx="7" fill="#E59866" stroke="#CA6F1E" stroke-width="1.8"/>
  <text x="565" y="345" text-anchor="middle" font-size="11" font-weight="bold" fill="white">splatObj.SetActive(true)</text>
  <text x="565" y="360" text-anchor="middle" font-size="10" fill="#FEF5E7">여기서 OnEnable 실행 → m_Asset 이미 세팅됨</text>

  <!-- Bug note box -->
  <rect x="155" y="405" width="430" height="28" rx="6" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1.5"/>
  <text x="370" y="423" text-anchor="middle" font-size="10.5" fill="#C0392B">
    ※ SetActive(false) 없이 AddComponent 시 OnEnable이 m_Asset=null 상태로 실행 → 렌더러 빈 화면
  </text>

  <text x="370" y="445" text-anchor="middle" font-size="11" fill="#666">
    그림 4. Unity 런타임 로더 스레드 분리 구조 — 파일 I/O(백그라운드)와 Unity API(메인)의 명확한 역할 분리
  </text>
</svg>
